<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos para la nueva tabla 16PF */
        :root {
            --bg:          #f4f3ef;
            --surface:     #ffffff;
            --border:      #c8c4b8;
            --border-dark: #2a2824;
            --text:        #1a1815;
            --text-muted:  #7a7670;
            --green-bg:    #d4edda;
            --green-line:  #5aab6e;
            --gray-bg:     #e8e6e1;
            --accent:      #1a1815;
            --dot:         #1a1815;
            --section-bg:  #dde8f0;
            --section-txt: #1a4a6e;
            --header-bg:   #eef3f7;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        .profile-wrap {
            overflow-x: auto;
            padding: 16px 0;
        }

        table.profile {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            table-layout: fixed;
            margin: 0 auto;
        }

        .col-section  { width: 26px; }
        .col-bullet   { width: 18px; }
        .col-fac      { width: 38px; }
        .col-name     { width: 180px; }
        .col-pd       { width: 34px; }
        .col-dt       { width: 34px; }
        .col-dec      { width: 54px; }

        table.profile td, table.profile th {
            border: 1px solid var(--border);
            padding: 0;
            text-align: center;
            vertical-align: middle;
            height: 28px;
            font-family: var(--sans);
        }

        table.profile thead th {
            background: var(--header-bg);
            font-weight: 700;
            font-size: 11.5px;
            height: 30px;
            border-color: var(--border-dark);
        }

        table.profile thead th.th-name {
            text-align: left;
            padding-left: 8px;
        }

        table.profile thead th.dec-green { background: var(--green-bg); }
        table.profile thead th.dec-gray  { background: var(--gray-bg);  }

        .td-fac   { font-weight: 700; font-family: var(--mono); font-size: 11px; }
        .td-name  { text-align: left !important; padding-left: 8px !important; font-size: 12px; }
        .td-num   { font-weight: 700; font-family: var(--mono); font-size: 12px; }
        .td-bullet { font-size: 14px; color: #555; }

        .dec-green { background: var(--green-bg); }
        .dec-gray  { background: var(--gray-bg);  }

        .dot-cell {
            position: relative;
            overflow: visible;
        }

        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--dot);
            position: relative;
            z-index: 3;
        }

        .profile-chart-wrap {
            position: relative;
        }

        .profile-chart-wrap svg.connector-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: visible;
        }

        .section-sep td {
            background: var(--section-bg) !important;
            color: var(--section-txt);
            font-weight: 700;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: .08em;
            font-family: var(--mono);
            height: 22px;
            border-color: var(--border-dark) !important;
        }

        .section-sep td.dec-green { background: var(--green-bg) !important; }
        .section-sep td.dec-gray  { background: var(--gray-bg)  !important; }

        .td-section-label {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            font-family: var(--mono);
            color: var(--section-txt);
            background: var(--section-bg) !important;
            border-right: 2px solid var(--border-dark) !important;
            border-color: var(--border-dark) !important;
            padding: 4px 2px;
            white-space: nowrap;
        }

        tr.data-row:hover td {
            background-color: #f0ede6 !important;
        }

        tr.data-row:hover td.dec-green { background-color: #c2e6cc !important; }
        tr.data-row:hover td.dec-gray  { background-color: #d8d5ce !important; }
    </style>
</head>
<body>
    <h1>Formulario</h1>
    <form id="survey-form">
        <fieldset class="personal-data">
            <legend>Datos personales</legend>
            <label>Nombre y Apellido:
                <input type="text" name="nombre" required>
            </label><br>
            <label>Edad:
                <input type="number" name="edad" required>
            </label><br>
            <label>Sexo:
                <select name="sexo" required>
                    <option value="m">Masculino</option>
                    <option value="f">Femenino</option>
                    <option value="o">Otro</option>
                </select>
            </label><br>
            <label>Grado Educativo:
                <input type="text" name="grado" required>
            </label><br>
            <label>Fecha:
                <input type="date" name="fecha" required>
            </label><br>
            <label>Responsable:
                <input type="text" name="responsable" required>
            </label>
        </fieldset>
        <table id="factors-table">
            <thead>
                <tr>
                    <th>Factor</th>
                    <th>A</th>
                    <th>B</th>
                    <th>C</th>
                    <th>E</th>
                    <th>F</th>
                    <th>G</th>
                    <th>H</th>
                    <th>I</th>
                    <th>L</th>
                    <th>M</th>
                    <th>N</th>
                    <th>O</th>
                    <th>Q1</th>
                    <th>Q2</th>
                    <th>Q3</th>
                    <th>Q4</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>PB</td>
                        <td id="pb-a"></td>
                    <td id="pb-b"></td>
                    <td id="pb-c"></td>
                    <td id="pb-e"></td>
                    <td id="pb-f"></td>
                    <td id="pb-g"></td>
                    <td id="pb-h"></td>
                    <td id="pb-i"></td>
                    <td id="pb-l"></td>
                    <td id="pb-m"></td>
                    <td id="pb-n"></td>
                    <td id="pb-o"></td>
                    <td id="pb-q1"></td>
                    <td id="pb-q2"></td>
                    <td id="pb-q3"></td>
                    <td id="pb-q4"></td>
                </tr>
                <tr>
                    <td>Decat</td>
                    <td id="decat-a"></td>
                    <td id="decat-b"></td>
                    <td id="decat-c"></td>
                    <td id="decat-e"></td>
                    <td id="decat-f"></td>
                    <td id="decat-g"></td>
                    <td id="decat-h"></td>
                    <td id="decat-i"></td>
                    <td id="decat-l"></td>
                    <td id="decat-m"></td>
                    <td id="decat-n"></td>
                    <td id="decat-o"></td>
                    <td id="decat-q1"></td>
                    <td id="decat-q2"></td>
                    <td id="decat-q3"></td>
                    <td id="decat-q4"></td>
                </tr>
            </tbody>
        </table>
        <div id="questions-container"></div>
        
        <!-- Canvas para gráficos Chart.js -->
        <div class="chart-wrapper">
            <canvas id="results-chart"></canvas>
        </div>
        <div class="chart-wrapper">
            <canvas id="perfil-chart"></canvas>
        </div>
        
        <button type="submit">Enviar</button>
        <button type="button" id="generate-report">Generar informe</button>
    </form>

    <!-- NUEVA TABLA 16PF -->
    <div class="profile-wrap">
        <div class="profile-chart-wrap" id="chartWrap">
            <table class="profile" id="profileTable">
                <colgroup>
                    <col class="col-section">
                    <col class="col-bullet">
                    <col class="col-fac">
                    <col class="col-name">
                    <col class="col-pd">
                    <col class="col-dt">
                    <col class="col-dec"><col class="col-dec"><col class="col-dec">
                    <col class="col-dec"><col class="col-dec"><col class="col-dec"><col class="col-dec">
                    <col class="col-dec"><col class="col-dec"><col class="col-dec">
                </colgroup>
                <thead>
                    <tr>
                        <th></th>
                        <th></th>
                        <th>Fac.</th>
                        <th class="th-name">Nombre del factor</th>
                        <th>PD</th>
                        <th>DT</th>
                        <th class="dec-gray">1</th>
                        <th class="dec-gray">2</th>
                        <th class="dec-gray">3</th>
                        <th class="dec-green">4</th>
                        <th class="dec-green">5</th>
                        <th class="dec-green">6</th>
                        <th class="dec-green">7</th>
                        <th class="dec-gray">8</th>
                        <th class="dec-gray">9</th>
                        <th class="dec-gray">10</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- generado por JS -->
                </tbody>
            </table>
            <svg class="connector-line" id="svgLines"></svg>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://unpkg.com/docx@7.7.0/build/index.js"></script>
    <script id="table-16pf-script">
        // Nombres de factores para la tabla 16PF
        const factor16PFNames = {
            'A': 'Afabilidad', 'B': 'Razonamiento', 'C': 'Estabilidad', 'E': 'Dominancia',
            'F': 'Animación', 'G': 'Atención a las normas', 'H': 'Atrevimiento', 'I': 'Sensibilidad',
            'L': 'Vigilancia', 'M': 'Abstracción', 'N': 'Privacidad', 'O': 'Aprensión',
            'Q1': 'Apertura al cambio', 'Q2': 'Autosuficiencia', 'Q3': 'Perfeccionismo', 'Q4': 'Tensión',
            'MI': 'Manipulación de imagen', 'IN': 'Infrecuencia', 'AQ': 'Aquiescencia',
            'Ext': 'Extraversión', 'Ans': 'Ansiedad', 'Dur': 'Dureza', 'Ind': 'Independencia', 'AuC': 'Autocontrol'
        };

        function initTable16PF() {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            
            // Limpiar tabla
            tbody.innerHTML = '';

            function decClass(n) { return (n >= 4 && n <= 7) ? 'dec-green' : 'dec-gray'; }

            function makeSepRow(label) {
                const tr = document.createElement('tr');
                tr.className = 'section-sep';
                const td = document.createElement('td');
                td.colSpan = 6;
                td.textContent = label;
                td.style.textAlign = 'left';
                td.style.paddingLeft = '10px';
                tr.appendChild(td);
                for (let i = 1; i <= 10; i++) {
                    const tdD = document.createElement('td');
                    tdD.className = decClass(i);
                    tr.appendChild(tdD);
                }
                return tr;
            }

            function makeSectionLabelCell(label, rowspan) {
                const td = document.createElement('td');
                td.className = 'td-section-label';
                td.rowSpan = rowspan;
                td.textContent = label;
                return td;
            }

            function makeDataRow(fac, nombre, pd, dec, bullet) {
                const tr = document.createElement('tr');
                tr.className = 'data-row';
                tr.dataset.dec = dec;

                const tdB = document.createElement('td');
                tdB.className = 'td-bullet';
                tdB.textContent = bullet ? '•' : '';
                tr.appendChild(tdB);

                const tdF = document.createElement('td');
                tdF.className = 'td-fac';
                tdF.textContent = fac;
                tr.appendChild(tdF);

                const tdN = document.createElement('td');
                tdN.className = 'td-name';
                tdN.textContent = nombre;
                tr.appendChild(tdN);

                const tdPD = document.createElement('td');
                tdPD.className = 'td-num';
                tdPD.textContent = pd != null ? pd : '';
                tr.appendChild(tdPD);

                const tdDT = document.createElement('td');
                tdDT.className = 'td-num';
                tdDT.textContent = dec;
                tr.appendChild(tdDT);

                for (let n = 1; n <= 10; n++) {
                    const td = document.createElement('td');
                    td.className = decClass(n);
                    if (n === dec) {
                        td.classList.add('dot-cell');
                        const dot = document.createElement('span');
                        dot.className = 'dot';
                        td.appendChild(dot);
                    }
                    tr.appendChild(td);
                }
                return tr;
            }

            // Escalas Primarias (placeholder - se actualizan con datos reales)
            tbody.appendChild(makeSepRow('ESCALAS PRIMARIAS'));
            ['A', 'B', 'C', 'E', 'F', 'G', 'H', 'I', 'L', 'M', 'N', 'O', 'Q1', 'Q2', 'Q3', 'Q4'].forEach((fac, i) => {
                const nombre = factor16PFNames[fac];
                tbody.appendChild(makeDataRow(fac, nombre, 0, 5, false));
            });

            // Estilos de Respuesta
            tbody.appendChild(makeSepRow('ESTILOS DE RESPUESTA'));
            ['MI', 'IN', 'AQ'].forEach((fac, i) => {
                const nombre = factor16PFNames[fac];
                tbody.appendChild(makeDataRow(fac, nombre, 0, 5, false));
            });

            // Dimensiones Globales
            tbody.appendChild(makeSepRow('DIMENSIONES GLOBALES'));
            ['Ext', 'Ans', 'Dur', 'Ind', 'AuC'].forEach((fac, i) => {
                const nombre = factor16PFNames[fac];
                tbody.appendChild(makeDataRow(fac, nombre, null, 5, false));
            });

            drawLines();
        }

        function updateTable16PF(pbValues, decValues) {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            
            const rows = Array.from(tbody.querySelectorAll('tr.data-row'));
            const factors = ['A', 'B', 'C', 'E', 'F', 'G', 'H', 'I', 'L', 'M', 'N', 'O', 'Q1', 'Q2', 'Q3', 'Q4', 'MI', 'IN', 'AQ', 'Ext', 'Ans', 'Dur', 'Ind', 'AuC'];
            
            rows.forEach((row, idx) => {
                if (idx >= factors.length) return;
                
                const fac = factors[idx];
                const pd = pbValues[fac] !== undefined ? pbValues[fac] : 0;
                const dec = decValues[fac] !== undefined ? decValues[fac] : 5;
                
                // Encontrar celdas PD y DT (3era y 4ta celdas td después del bullet y factor)
                const tds = row.querySelectorAll('td');
                if (tds.length > 3) {
                    // Índice: [0] bullet, [1] factor, [2] nombre, [3] PD, [4] DT, [5+] decatipos
                    tds[3].textContent = pd || ''; // PD
                    tds[4].textContent = dec;      // DT
                    
                    // Actualizar celdas de decatipos
                    for (let i = 5; i < tds.length; i++) {
                        const colNum = i - 4; // 1-10
                        const td = tds[i];
                        td.innerHTML = '';
                        
                        const esVerde = colNum >= 4 && colNum <= 7;
                        const fill = esVerde ? 'dec-green' : 'dec-gray';
                        td.className = fill;
                        
                        if (colNum === dec) {
                            td.classList.add('dot-cell');
                            const dot = document.createElement('span');
                            dot.className = 'dot';
                            td.appendChild(dot);
                        }
                    }
                }
            });
            
            drawLines();
        }

        function drawLines() {
            const wrap = document.getElementById('chartWrap');
            const svg = document.getElementById('svgLines');
            if (!wrap || !svg) return;
            
            const wrapRect = wrap.getBoundingClientRect();
            svg.setAttribute('viewBox', `0 0 ${wrapRect.width} ${wrapRect.height}`);
            svg.innerHTML = '';

            const allRows = Array.from(document.querySelectorAll('tr.data-row'));
            const sections = [
                allRows.slice(0, 16),  // Escalas primarias
                allRows.slice(16, 19), // Estilos de respuesta
                allRows.slice(19),     // Dimensiones globales
            ];

            sections.forEach(rows => {
                const points = [];
                rows.forEach(tr => {
                    const dot = tr.querySelector('.dot');
                    if (!dot) return;
                    const dotRect = dot.getBoundingClientRect();
                    const x = dotRect.left - wrapRect.left + dotRect.width / 2;
                    const y = dotRect.top - wrapRect.top + dotRect.height / 2;
                    points.push({ x, y });
                });
                if (points.length < 2) return;
                const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                polyline.setAttribute('points', points.map(p => `${p.x},${p.y}`).join(' '));
                polyline.setAttribute('fill', 'none');
                polyline.setAttribute('stroke', '#1a1815');
                polyline.setAttribute('stroke-width', '1.5');
                polyline.setAttribute('stroke-linejoin', 'round');
                polyline.setAttribute('stroke-linecap', 'round');
                svg.appendChild(polyline);
            });
        }

        // Inicializar tabla al cargar
        window.addEventListener('load', initTable16PF);
        window.addEventListener('resize', drawLines);
    </script>
    <script src="main.js"></script>
</body>
</html>
